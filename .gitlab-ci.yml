stages:
  - test
  - build

variables:
  PNPM_VERSION: "10"
  NODE_VERSION: "20"

# ──────────────────────────────────────────────
# Backend: lint → typecheck → unit tests → e2e tests → build
# ──────────────────────────────────────────────
backend:
  stage: test
  image: node:${NODE_VERSION}
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: screenquest_test
    POSTGRES_USER: screenquest
    POSTGRES_PASSWORD: screenquest
    DATABASE_URL: "postgresql://screenquest:screenquest@postgres:5432/screenquest_test?schema=public"
    REDIS_URL: "redis://redis:6379/1"
    JWT_SECRET: "ci-test-jwt-secret"
    JWT_ACCESS_EXPIRY: "15m"
    NODE_ENV: test
    APP_URL: "http://localhost:3000"
    FRONTEND_URL: "http://localhost:8081"
    SMTP_HOST: "smtp.mailtrap.io"
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASS: ""
    EMAIL_FROM: "test@screenquest.app"
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    # Typecheck
    - pnpm --filter backend exec tsc --noEmit
    # Run Prisma migrations
    - pnpm --filter backend exec prisma migrate deploy
    # Unit tests
    - pnpm --filter backend test
    # E2E tests
    - pnpm --filter backend test:e2e
    # Build
    - pnpm --filter backend exec nest build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-backend
    paths:
      - node_modules/
      - backend/node_modules/
  only:
    changes:
      - backend/**/*
      - shared/**/*
      - pnpm-lock.yaml

# ──────────────────────────────────────────────
# Mobile: lint → typecheck → export
# ──────────────────────────────────────────────
mobile:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter mobile exec tsc --noEmit
    - pnpm --filter mobile exec expo export --platform web
  cache:
    key: ${CI_COMMIT_REF_SLUG}-mobile
    paths:
      - node_modules/
      - mobile/node_modules/
  only:
    changes:
      - mobile/**/*
      - shared/**/*
      - pnpm-lock.yaml

# ──────────────────────────────────────────────
# CMS: lint → build
# ──────────────────────────────────────────────
cms:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter cms build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-cms
    paths:
      - node_modules/
      - cms/node_modules/
  only:
    changes:
      - cms/**/*
      - shared/**/*
      - pnpm-lock.yaml
