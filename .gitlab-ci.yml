stages:
  - test
  - build
  - deploy

variables:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"

# ──────────────────────────────────────────────
# Test Stage
# ──────────────────────────────────────────────

backend:
  stage: test
  image: node:${NODE_VERSION}
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: screenquest_test
    POSTGRES_USER: screenquest
    POSTGRES_PASSWORD: screenquest
    DATABASE_URL: "postgresql://screenquest:screenquest@postgres:5432/screenquest_test?schema=public"
    REDIS_URL: "redis://redis:6379/1"
    JWT_SECRET: "ci-test-jwt-secret"
    JWT_ACCESS_EXPIRY: "15m"
    NODE_ENV: test
    APP_URL: "http://localhost:3000"
    FRONTEND_URL: "http://localhost:8081"
    SMTP_HOST: "smtp.mailtrap.io"
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASS: ""
    EMAIL_FROM: "test@screenquest.app"
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter backend exec prisma generate
    - pnpm --filter backend exec tsc --noEmit
    - pnpm --filter backend exec prisma migrate deploy
    - pnpm --filter backend test
    - pnpm --filter backend test:e2e
    - pnpm --filter backend exec nest build
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

mobile:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter mobile exec tsc --noEmit
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cms:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter cms build
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - cms/**/*
        - shared/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - cms/**/*
        - shared/**/*

# ──────────────────────────────────────────────
# Build Stage
# ──────────────────────────────────────────────

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE/backend
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f backend/Dockerfile -t $IMAGE_TAG:$CI_COMMIT_SHORT_SHA -t $IMAGE_TAG:latest .
    - docker push $IMAGE_TAG:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_TAG:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

docker-build-dry:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -f backend/Dockerfile -t screenquest-backend:test .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ──────────────────────────────────────────────
# Deploy Stage (manual triggers)
# ──────────────────────────────────────────────

eas-build:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - npm install -g eas-cli
  script:
    - cd mobile && eas build --platform ${PLATFORM:-all} --profile production --non-interactive
  variables:
    EXPO_TOKEN: $EXPO_TOKEN
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
