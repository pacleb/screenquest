stages:
  - test
  - build
  - deploy

variables:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"

# ──────────────────────────────────────────────
# Shared templates
# ──────────────────────────────────────────────

.node-setup:
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/

# ──────────────────────────────────────────────
# Test Stage
# ──────────────────────────────────────────────

backend:lint:
  stage: test
  extends: .node-setup
  script:
    - pnpm --filter backend lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

backend:
  stage: test
  extends: .node-setup
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: screenquest_test
    POSTGRES_USER: screenquest
    POSTGRES_PASSWORD: screenquest
    DATABASE_URL: "postgresql://screenquest:screenquest@postgres:5432/screenquest_test?schema=public"
    REDIS_URL: "redis://redis:6379/1"
    JWT_SECRET: "ci-test-jwt-secret"
    JWT_ACCESS_EXPIRY: "15m"
    NODE_ENV: test
    APP_URL: "http://localhost:3000"
    FRONTEND_URL: "http://localhost:8081"
    SMTP_HOST: "smtp.mailtrap.io"
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASS: ""
    EMAIL_FROM: "test@screenquest.app"
  script:
    - pnpm --filter backend exec prisma generate
    - pnpm --filter backend exec tsc --noEmit
    - pnpm --filter backend exec prisma migrate deploy
    - pnpm --filter backend test
    - pnpm --filter backend test:e2e
    - pnpm --filter backend exec nest build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

backend:coverage:
  stage: test
  extends: .node-setup
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: screenquest_test
    POSTGRES_USER: screenquest
    POSTGRES_PASSWORD: screenquest
    DATABASE_URL: "postgresql://screenquest:screenquest@postgres:5432/screenquest_test?schema=public"
    REDIS_URL: "redis://redis:6379/1"
    JWT_SECRET: "ci-test-jwt-secret"
    JWT_ACCESS_EXPIRY: "15m"
    NODE_ENV: test
    APP_URL: "http://localhost:3000"
    FRONTEND_URL: "http://localhost:8081"
    SMTP_HOST: "smtp.mailtrap.io"
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASS: ""
    EMAIL_FROM: "test@screenquest.app"
  script:
    - pnpm --filter backend exec prisma generate
    - pnpm --filter backend exec prisma migrate deploy
    - pnpm --filter backend test:cov
  coverage: '/All files[^|]*\|\s*([\d.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage/unit/cobertura-coverage.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

mobile:
  stage: test
  extends: .node-setup
  script:
    - pnpm --filter mobile exec tsc --noEmit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

mobile:lint:
  stage: test
  extends: .node-setup
  script:
    - pnpm --filter mobile lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cms:
  stage: test
  extends: .node-setup
  script:
    - pnpm --filter cms build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - cms/**/*
        - shared/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - cms/**/*
        - shared/**/*

# ──────────────────────────────────────────────
# Build Stage
# ──────────────────────────────────────────────

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE/backend
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f backend/Dockerfile -t $IMAGE_TAG:$CI_COMMIT_SHORT_SHA -t $IMAGE_TAG:latest .
    - docker push $IMAGE_TAG:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_TAG:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

docker-build-dry:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -f backend/Dockerfile -t screenquest-backend:test .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

sentry:backend:
  stage: build
  extends: .node-setup
  script:
    - pnpm --filter backend exec prisma generate
    - pnpm --filter backend build
    - npx @sentry/cli releases new "$CI_COMMIT_SHORT_SHA"
    - npx @sentry/cli releases files "$CI_COMMIT_SHORT_SHA" upload-sourcemaps backend/dist/
    - npx @sentry/cli releases finalize "$CI_COMMIT_SHORT_SHA"
  variables:
    SENTRY_AUTH_TOKEN: $SENTRY_AUTH_TOKEN
    SENTRY_ORG: $SENTRY_ORG
    SENTRY_PROJECT: $SENTRY_PROJECT_BACKEND
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $SENTRY_ORG
    - if: $CI_COMMIT_TAG && $SENTRY_ORG

# ──────────────────────────────────────────────
# Deploy Stage
# ──────────────────────────────────────────────

deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - 'curl -sf -X POST "$RENDER_DEPLOY_HOOK_STAGING"'
  environment:
    name: staging
    url: https://staging-api.screenquest.app
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - 'curl -sf -X POST "$RENDER_DEPLOY_HOOK_PRODUCTION"'
  environment:
    name: production
    url: https://api.screenquest.app
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

