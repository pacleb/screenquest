services:
  - type: web
    name: screenquest-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    repo: https://github.com/pacleb/screenquest
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false  # Set to Supabase pooled connection string (port 6543) with ?pgbouncer=true
      - key: DIRECT_URL
        sync: false  # Set to Supabase direct connection string (port 5432)
      - key: REDIS_URL
        fromService:
          name: screenquest-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "30d"
      - key: APP_URL
        sync: false  # Set manually after deploy
      - key: RESEND_API_KEY
        sync: false  # Set manually
      - key: EMAIL_FROM
        value: "ScreenQuest <onboarding@resend.dev>"
      - key: FRONTEND_URL
        sync: false  # Set to your web app URL (e.g. https://screenquest.vercel.app)
      - key: CMS_URL
        sync: false  # Set to your CMS URL (e.g. https://screenquest-cms.vercel.app)
      - key: ALLOWED_ORIGINS
        sync: false  # Comma-separated additional origins (e.g. https://other.vercel.app)
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false  # JSON-stringified Firebase service account — required for FCM push notifications

databases:
  - name: screenquest-redis
    plan: free
