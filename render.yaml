services:
  - type: web
    name: screenquest-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    repo: https://github.com/pacleb/screenquest
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: screenquest-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: screenquest-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "30d"
      - key: APP_URL
        sync: false  # Set manually after deploy
      - key: RESEND_API_KEY
        sync: false  # Set manually
      - key: EMAIL_FROM
        value: "ScreenQuest <onboarding@resend.dev>"

databases:
  - name: screenquest-db
    plan: free
    databaseName: screenquest
    user: screenquest

  - name: screenquest-redis
    plan: free
