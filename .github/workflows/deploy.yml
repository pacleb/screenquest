# ──────────────────────────────────────────────
# Deploy Pipeline — triggered after CI passes
# ──────────────────────────────────────────────

name: Deploy

on:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────── Deploy to Production (on tag, manual approval) ──────────────

  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: production
      url: https://api.screenquest.app
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_PRODUCTION not set, skipping deploy"
            exit 0
          fi
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}"
