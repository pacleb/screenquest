# ──────────────────────────────────────────────
# CI Pipeline — runs on PRs and pushes to main
# ──────────────────────────────────────────────

name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"

jobs:
  # ────────────── Lint ──────────────

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend lint

  mobile-lint:
    name: Mobile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter mobile lint

  # ────────────── Type Check ──────────────

  mobile-typecheck:
    name: Mobile Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter mobile exec tsc --noEmit

  # ────────────── Backend Tests ──────────────

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: screenquest_test
          POSTGRES_USER: screenquest
          POSTGRES_PASSWORD: screenquest
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U screenquest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "postgresql://screenquest:screenquest@localhost:5432/screenquest_test?schema=public"
      REDIS_URL: "redis://localhost:6379/1"
      JWT_SECRET: "ci-test-jwt-secret"
      JWT_ACCESS_EXPIRY: "15m"
      NODE_ENV: test
      APP_URL: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:8081"
      SMTP_HOST: "smtp.mailtrap.io"
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      EMAIL_FROM: "test@screenquest.app"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm --filter backend exec tsc --noEmit
      - run: pnpm --filter backend exec prisma migrate deploy
      - run: pnpm --filter backend test
      - run: pnpm --filter backend test:e2e
      - run: pnpm --filter backend exec nest build

  # ────────────── Backend Coverage ──────────────

  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: screenquest_test
          POSTGRES_USER: screenquest
          POSTGRES_PASSWORD: screenquest
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U screenquest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "postgresql://screenquest:screenquest@localhost:5432/screenquest_test?schema=public"
      REDIS_URL: "redis://localhost:6379/1"
      JWT_SECRET: "ci-test-jwt-secret"
      JWT_ACCESS_EXPIRY: "15m"
      NODE_ENV: test
      APP_URL: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:8081"
      SMTP_HOST: "smtp.mailtrap.io"
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      EMAIL_FROM: "test@screenquest.app"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm --filter backend exec prisma migrate deploy
      - run: pnpm --filter backend test:cov

  # ────────────── CMS Build ──────────────

  cms-build:
    name: CMS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter cms build

  # ────────────── Docker Build (dry run on PRs) ──────────────

  docker-build-dry:
    name: Docker Build (Dry Run)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f backend/Dockerfile -t screenquest-backend:test .

  # ────────────── Docker Build + Push (main & tags) ──────────────

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/backend
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build -f backend/Dockerfile \
            -t $IMAGE:$SHA \
            -t $IMAGE:latest .
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest

  # ────────────── Sentry Source Maps ──────────────

  sentry-sourcemaps:
    name: Sentry Source Maps
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    env:
      SENTRY_ORG: pacleb
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_BACKEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm --filter backend build
      - name: Upload source maps
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          npx @sentry/cli releases new "$SHA"
          npx @sentry/cli sourcemaps upload --release="$SHA" backend/dist/
          npx @sentry/cli releases finalize "$SHA"
