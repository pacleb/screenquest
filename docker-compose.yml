version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: screenquest-db
    environment:
      POSTGRES_USER: screenquest
      POSTGRES_PASSWORD: screenquest
      POSTGRES_DB: screenquest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screenquest"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: screenquest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: screenquest-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://screenquest:screenquest@postgres:5432/screenquest?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      JWT_ACCESS_EXPIRY: "15m"
      NODE_ENV: development
      PORT: "3000"
      APP_URL: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
